<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- Wichtig für mobile Geräte -->
    <title>Entscheidungs-Helfer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <button id="themeToggle" class="theme-btn" aria-label="Wechsle das Design">🌙</button>

    <main class="container">
        <header>
            <h1>Unentschlossen?</h1>
            <p>Lass mich für dich entscheiden! <br>

            Gib deine Optionen mit Komma getrennt ein:</p>
        </header>
        
        <section class="input-area">
            <input type="text" id="optionsInput" placeholder="Pizza, Pasta, Burger..." aria-label="Optionen eingeben">

            <div class="quick-add">
                <button class="quick-btn" type="button">Pizza</button>
                <button class="quick-btn" type="button">Döner</button>
                <button class="quick-btn" type="button">Burger</button>
                <button class="quick-btn" type="button">Zocken</button>
                <button class="quick-btn" type="button">Schlafen</button>
                <button class="quick-btn" type="button">Sushi</button>
                <button class="quick-btn" type="button">Pasta</button>
                <button class="quick-btn" type="button">Kino</button>
                <button class="quick-btn" type="button">Gym</button>
                <button class="quick-btn" type="button">Netflix</button>
                <button class="quick-btn" type="button">Spazieren</button>
            </div>

            <div class="button-group"> <!-- Div umändern? -->   
                <button id="spinBtn">Entscheide für mich!</button>
                <button id="clearBtn" class="clear-btn" aria-label="Eingabe löschen">🗑️</button>
            </div>
        </section>

        <p id="statusText" class="status-text"></p> 
        
        <output id="result">?</output>

        <section class="hinweis">
            <p>Entwickler: Emre Öztürk</p>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script> <!-- CDN für Konfetti-Bibliothek -->

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script> <!-- schönere Alert Anzeige -->

    <script src="app.js"></script>
</body>
</html>
