<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Entscheidungs-Helfer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="container">
        <header>
            <h1>Was soll ich tun?</h1>
            <p>Gib deine Optionen mit Komma getrennt ein:</p>
        </header>
        
        <section class="input-area">
            <input type="text" id="optionsInput" placeholder="Pizza, Pasta, Burger..." aria-label="Optionen eingeben">
            <button id="spinBtn">Entscheide für mich!</button>
        </section>

        <output id="result">?</output>

        <section class="hinweis">
            <p>Seite wird noch verbessert und ist in Entwicklung.</p>
            <p>Emre Öztürk</p>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
